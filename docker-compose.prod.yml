# Production stack: Hetzner + Neon (no local Postgres).
# Run: docker compose -f docker-compose.prod.yml up -d --build
# Requires .env with DATABASE_URL (Neon), ADMIN_EMAIL, ADMIN_PASSWORD_HASH, etc.

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "8433:8433"
    env_file:
      - .env-prod
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
      n8n:
        condition: service_started
      awbtrackers:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    # nginx serves static on 8080

  backend:
    build: ./backend
    env_file:
      - .env-prod
    environment:
      NODE_ENV: production
      AWBTRACKERS_URL: http://awbtrackers:8000
      N8N_INVITE_WEBHOOK_URL: http://n8n:5678/webhook/user-email
    depends_on:
      awbtrackers:
        condition: service_started
    deploy:
      restart_policy:
        condition: on-failure

  awbtrackers:
    build:
      context: ./AWBTrackers
      dockerfile: Dockerfile
    env_file:
      - .env-prod
    deploy:
      restart_policy:
        condition: on-failure

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: "5678"
      WEBHOOK_URL: https://168.119.228.149:8433/
      N8N_BACKEND_URL: ${N8N_BACKEND_URL:-}
    depends_on:
      - backend
    deploy:
      restart_policy:
        condition: on-failure

