# CargoGent local dev stack
# Run: docker compose up --build

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env-dev
    depends_on:
      - backend
      - frontend
      - n8n
      - awbtrackers

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE: /api
    ports:
      - "8080:8080"

  backend:
    build: ./backend
    env_file:
      - .env-dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://cargogent:dev@postgres:5432/cargogent
      AWBTRACKERS_URL: http://awbtrackers:8000
    depends_on:
      postgres:
        condition: service_healthy
      awbtrackers:
        condition: service_started

  awbtrackers:
    build:
      context: ./AWBTrackers
      dockerfile: Dockerfile
    environment:
      - PROXY_URL=${PROXY_URL:-}
    env_file:
      - .env-dev
    # No ports exposed to host by default; access via Caddy. For direct benchmark: uncomment.
    # ports:
    #   - "8000:8000"

  # Backend (Node) - add when backend/ is implemented
  # backend:
  #   build: ./backend
  #   environment:
  #     - NODE_ENV=development
  #     - DATABASE_URL=postgresql://cargogent:dev@postgres:5432/cargogent
  #     - AWBTRACKERS_URL=http://awbtrackers:8000
  #   depends_on:
  #     - postgres
  #     - awbtrackers

  # Frontend - add when frontend/ is implemented
  # frontend:
  #   build: ./frontend
  #   environment:
  #     - VITE_API_BASE=/api

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_BACKEND_URL: http://localhost/n8n
      # Pre-configure owner account so credentials are always known in dev
      N8N_OWNER_EMAIL: admin@cargogent.com
      N8N_OWNER_PASSWORD: CargoGent1!
      N8N_OWNER_FIRST_NAME: CargoGent
      N8N_OWNER_LAST_NAME: Admin
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cargogent
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: cargogent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cargogent"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  n8n_data:
  caddy_data:
  caddy_config:
